name: "PR Notifications"

on:
  workflow_call:
    inputs:
      to:
        type: string
        default: "notifications@lmcustoms.cc"
    secrets:
      SMTP_SERVER:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false

jobs:
  notify:
    name: Send PR Notification
    runs-on: ubuntu-latest

    steps:
      - name: Send email
        if: secrets.SMTP_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PR #${{ github.event.pull_request.number }} ${{ github.event.action }} — ${{ github.repository }}"
          to: ${{ inputs.to }}
          from: github@lmcustoms.cc
          body: |
            Pull Request: #${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Action: ${{ github.event.action }}
            Author: ${{ github.event.pull_request.user.login }}
            Repository: ${{ github.repository }}

            ${{ github.event.pull_request.body }}

            View PR: ${{ github.event.pull_request.html_url }}
