name: "Create Issue on Failure"

on:
  workflow_call:
    inputs:
      label:
        type: string
        default: "ci-failure"
        description: "Label to apply to the created issue"

jobs:
  create-issue:
    name: Create Failure Issue
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = '${{ github.workflow }}';
            const repo = '${{ github.repository }}';
            const branch = '${{ github.ref_name }}';
            const sha = '${{ github.sha }}'.substring(0, 7);
            const actor = '${{ github.actor }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const label = '${{ inputs.label }}';

            const title = `CI Failure: ${workflow} on ${branch} (${sha})`;

            const body = [
              `## Workflow Failure`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Workflow** | ${workflow} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Author** | @${actor} |`,
              `| **Run** | [View logs](${runUrl}) |`,
              ``,
              `---`,
              `*Auto-created by GitHub Actions*`,
            ].join('\n');

            // Check for existing open issue with same workflow + branch to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const prefix = `CI Failure: ${workflow} on ${branch}`;
            const duplicate = existing.data.find(i => i.title.startsWith(prefix));

            if (duplicate) {
              // Comment on existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `### Still failing\n\nCommit \`${sha}\` by @${actor}\n\n[View run](${runUrl})`,
              });
              core.info(`Commented on existing issue #${duplicate.number}`);
            } else {
              // Ensure label exists
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'D93F0B',
                  description: 'Automated: CI workflow failure',
                });
              }

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
              core.info(`Created issue #${issue.data.number}`);
            }
